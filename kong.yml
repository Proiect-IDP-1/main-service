_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:3000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false

  - name: order-service
    url: http://order-service:5000
    routes:
      - name: order-route
        paths:
          - /store
        strip_path: false


