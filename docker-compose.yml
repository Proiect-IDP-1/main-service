version: '3.8'

networks:
  public_net:
    driver: bridge
  data_net:
    driver: bridge

services:
  db:
    image: postgres:15
    container_name: boardgame_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: boardgamepassword
      POSTGRES_DB: tabletop_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - data_net
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: boardgame_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tabletop.ro
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    ports:
      - "8080:80"
    networks:
      - data_net
      - public_net

  auth-db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - data_net

  auth-service:
    build: ./auth-service
    container_name: auth_service
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - auth-db
    networks:
      - public_net
      - data_net

  adminer:
    image: adminer
    container_name: auth_adminer
    ports:
      - "8081:8080"
    networks:
      - data_net

  order-service:
    build: ./order-service
    container_name: order_service
    environment:
      - DB_HOST=db
      - DB_NAME=tabletop_db
      - DB_USER=admin
      - DB_PASS=boardgamepassword
    ports:
      - "5001:5000"
    depends_on:
      - db
    networks:
      - public_net
      - data_net

volumes:
  db_data: