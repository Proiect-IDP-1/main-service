# Kong declarative config (DB-less mode)
# Toate cererile externe trec prin Kong pe portul 8000.
# Documentatie format: https://docs.konghq.com/gateway/latest/production/deployment-topologies/db-less-and-declarative-config/

_format_version: "3.0"
_transform: true

# Plugin-uri globale
plugins:
  - name: prometheus
    config:
      per_consumer: false
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

services:
  # ===== Auth Service =====
  - name: auth-service
    url: http://auth-service:3000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Authorization, Content-Type]
          credentials: true

  # ===== Catalog Service (Business Logic) =====
  - name: catalog-service
    url: http://catalog-service:5000
    routes:
      - name: catalog-route
        paths:
          - /catalog
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Authorization, Content-Type]
          credentials: true

  # ===== Order Service (IO) =====
  - name: order-service
    url: http://order-service:5000
    routes:
      - name: order-buy-route
        paths:
          - /buy
        strip_path: false
      - name: order-orders-route
        paths:
          - /orders
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Authorization, Content-Type]
          credentials: true
